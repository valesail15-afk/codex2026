name: quality-gate

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  text-lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Text Integrity
        run: npm run -s check:text

      - name: Type Check
        run: npm run -s lint

      - name: Build
        run: npm run -s build
